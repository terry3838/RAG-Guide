<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020.327 201.99166666666667" width="1020.327" height="201.99166666666667" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="BUILD" data-to="RETRIEVE" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="143.453,85.39166666666668 179.453,85.39166666666668 179.453,110.49166666666667 191.453,110.49166666666667" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="RETRIEVE" data-to="JUDGE" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="309.726,110.49166666666667 357.726,110.49166666666667" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="JUDGE" data-to="PASS" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="497.488,110.49166666666667 545.488,110.49166666666667" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="PASS" data-to="FIX" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="No" points="631.3213333333334,93.325 684.488,93.325 684.488,81.11666666666667 755.2059999999999,81.11666666666667 755.2059999999999,64.60000000000001 770.1759999999999,64.60000000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FIX" data-to="BUILD" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="770.1759999999999,52.300000000000004 755.2059999999999,52.300000000000004 755.2059999999999,47.45 533.488,47.45 533.488,73.09166666666667 143.453,73.09166666666667" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="PASS" data-to="RELEASE" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="Yes" points="631.3213333333334,127.65833333333333 770.1759999999999,127.65833333333335" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="PASS" data-to="FIX" data-label="No">
  <rect x="692.488" y="65.11666666666667" width="30.718000000000004" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="707.8470000000001" y="80.26666666666668" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">No</text>
</g>
<g class="edge-label" data-from="PASS" data-to="RELEASE" data-label="Yes">
  <rect x="692.488" y="111.65833333333333" width="36.658" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="710.817" y="126.80833333333334" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Yes</text>
</g>
<g class="node" data-id="BUILD" data-label="새 컬렉션" data-shape="rectangle">
  <rect x="40" y="60.79166666666667" width="103.453" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="91.7265" y="79.24166666666667" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">새 컬렉션</text>
</g>
<g class="node" data-id="RETRIEVE" data-label="평가셋 검색" data-shape="rectangle">
  <rect x="191.453" y="92.04166666666667" width="118.273" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="250.5895" y="110.49166666666667" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">평가셋 검색</text>
</g>
<g class="node" data-id="JUDGE" data-label="수동/자동 judge" data-shape="rectangle">
  <rect x="357.726" y="92.04166666666667" width="139.762" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="427.60699999999997" y="110.49166666666667" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">수동/자동 judge</text>
</g>
<g class="node" data-id="PASS" data-label="통과?" data-shape="diamond">
  <polygon points="596.988,58.991666666666674 648.488,110.49166666666667 596.988,161.99166666666667 545.488,110.49166666666667" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="596.988" y="110.49166666666667" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">통과?</text>
</g>
<g class="node" data-id="FIX" data-label="청킹 / metadata / rerank 수정" data-shape="rectangle">
  <rect x="770.1759999999999" y="40" width="213.121" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="876.7365" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">청킹 / metadata / rerank 수정</text>
</g>
<g class="node" data-id="RELEASE" data-label="기본 컬렉션 전환" data-shape="rectangle">
  <rect x="770.1759999999999" y="109.20833333333334" width="150.136" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="845.2439999999999" y="127.65833333333335" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">기본 컬렉션 전환</text>
</g>
</svg>