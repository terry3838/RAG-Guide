<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 712.0785000000001 400" width="712.0785000000001" height="400" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="U" x1="70" y1="70" x2="70" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Q" x1="212.5465" y1="70" x2="212.5465" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="V" x1="362.0785" y1="70" x2="362.0785" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="R" x1="502.0785" y1="70" x2="502.0785" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="L" x1="642.0785000000001" y1="70" x2="642.0785000000001" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="U" data-to="Q" data-label="질문 입력" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="90" x2="212.5465" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="141.27325000000002" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">질문 입력</text>
</g>
<g class="message" data-from="Q" data-to="V" data-label="질문 임베딩 기반 검색" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="212.5465" y1="130" x2="362.0785" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="287.3125" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">질문 임베딩 기반 검색</text>
</g>
<g class="message" data-from="V" data-to="Q" data-label="후보 청크 반환" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="362.0785" y1="170" x2="212.5465" y2="170" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="287.3125" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">후보 청크 반환</text>
</g>
<g class="message" data-from="Q" data-to="R" data-label="후보 + 메타데이터 전달" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="212.5465" y1="210" x2="502.0785" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="357.3125" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">후보 + 메타데이터 전달</text>
</g>
<g class="message" data-from="R" data-to="Q" data-label="재정렬된 근거 후보" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="502.0785" y1="250" x2="212.5465" y2="250" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="357.3125" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">재정렬된 근거 후보</text>
</g>
<g class="message" data-from="Q" data-to="L" data-label="질문 + 근거 + 지시문 전달" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="212.5465" y1="290" x2="642.0785000000001" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="427.31250000000006" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">질문 + 근거 + 지시문 전달</text>
</g>
<g class="message" data-from="L" data-to="U" data-label="근거 기반 최종 답변" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="642.0785000000001" y1="330" x2="70" y2="330" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="356.03925000000004" y="320" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">근거 기반 최종 답변</text>
</g>
<g class="actor" data-id="U" data-label="User" data-type="participant">
  <rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="70" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">User</text>
</g>
<g class="actor" data-id="Q" data-label="Query Encoder" data-type="participant">
  <rect x="150" y="30" width="125.093" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="212.5465" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Query Encoder</text>
</g>
<g class="actor" data-id="V" data-label="Vector DB" data-type="participant">
  <rect x="315.093" y="30" width="93.971" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="362.0785" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Vector DB</text>
</g>
<g class="actor" data-id="R" data-label="Reranker" data-type="participant">
  <rect x="456.20450000000005" y="30" width="91.74799999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="502.0785" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Reranker</text>
</g>
<g class="actor" data-id="L" data-label="LLM" data-type="participant">
  <rect x="602.0785000000001" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="642.0785000000001" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">LLM</text>
</g>
</svg>