  <text x="302.096" y="516.75" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">retrieval tier 분리</text>
</g>
<g class="node" data-id="PRIMARY" data-label="Primary Chunks" data-shape="rectangle">
  <rect x="40" y="571.2" width="137.539" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="108.7695" y="589.6500000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Primary Chunks</text>
</g>
<g class="node" data-id="SECONDARY" data-label="Secondary Table Chunks" data-shape="rectangle">
  <rect x="205.539" y="571.2" width="193.11399999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="302.096" y="589.6500000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Secondary Table Chunks</text>
</g>
<g class="node" data-id="DROP" data-label="Drop" data-shape="rectangle">
  <rect x="426.6529999999999" y="571.2" width="71.59" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="462.4479999999999" y="589.6500000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Drop</text>
</g>
</svg>