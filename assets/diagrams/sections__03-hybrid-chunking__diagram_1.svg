  <text x="302.09599999999995" y="151.8" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="302.09599999999995" dy="-3.9000000000000012">구조 분리</tspan><tspan x="302.09599999999995" dy="16.900000000000002">heading / paragraph / table</tspan></text>
</g>
<g class="node" data-id="CLEAN" data-label="노이즈 제거" data-shape="rectangle">
