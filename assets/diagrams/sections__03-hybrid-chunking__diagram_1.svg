목차 제거 / 표 분리 / 시그니처 감지" data-shape="rectangle">
  <rect x="173.30549999999997" y="311.6" width="257.581" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="302.096" y="338.5" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="302.096" dy="-3.9000000000000012">규칙 적용</tspan><tspan x="302.096" dy="16.900000000000002">목차 제거 / 표 분리 / 시그니처 감지</tspan></text>
</g>
<g class="node" data-id="META" data-label="메타데이터 태깅" data-shape="rectangle">
  <rect x="228.13949999999997" y="413.40000000000003" width="147.913" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="302.096" y="431.85" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">메타데이터 태깅</text>
