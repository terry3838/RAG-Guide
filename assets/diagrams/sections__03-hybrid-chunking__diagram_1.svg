<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 538.2429999999999 660.0999999999999" width="538.2429999999999" height="660.0999999999999" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="PARSED" data-to="STRUCT" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,76.9 302.096,124.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="STRUCT" data-to="CLEAN" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,178.70000000000002 302.096,226.70000000000002" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="CLEAN" data-to="RULES" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,263.6 302.096,311.6" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="RULES" data-to="META" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,365.40000000000003 302.096,413.40000000000003" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="META" data-to="TIER" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,450.3 302.096,498.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="TIER" data-to="PRIMARY" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,535.2 302.096,553.2 108.7695,553.2 108.7695,571.2" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="TIER" data-to="SECONDARY" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,535.2 302.096,553.2 302.096,553.2 302.096,571.2" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="TIER" data-to="DROP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="302.096,535.2 302.096,553.2 462.4479999999999,553.2 462.4479999999999,571.2" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="PARSED" data-label="Parsed Document" data-shape="rectangle">
  <rect x="228.88049999999998" y="40" width="146.43099999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="302.096" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Parsed Document</text>
</g>
